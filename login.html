<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HubOn – Gestão de Patrimônio</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body class="login-page">

  <!-- Background full-screen -->
  <img class="login-bg" id="loginBg" src="login_bg.gif" alt="" />
  <div class="login-overlay"></div>
  <div class="login-divider"></div>

  <!-- Painel de login -->
  <div class="login-panel">

    <div class="login-logo-wrap">
      <img id="loginLogo" src="" alt="HubOn" class="login-logo-img" />
      <p class="login-tagline">Gestão de Patrimônio</p>
    </div>

    <h1 class="login-title">Bem-vindo<br>de volta</h1>
    <p class="login-subtitle">Acesse com suas credenciais para continuar.</p>

    <div class="login-error" id="loginError">Usuário ou senha incorretos.</div>

    <div class="login-form-group">
      <label>Usuário</label>
      <div class="login-input-wrap">
        <input type="text" id="inputUser" placeholder="Digite seu usuário" autocomplete="username" />
        <span class="login-icon">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
          </svg>
        </span>
      </div>
    </div>

    <div class="login-form-group">
      <label>Senha</label>
      <div class="login-input-wrap">
        <input type="password" id="inputPass" placeholder="Digite sua senha" autocomplete="current-password" />
        <span class="login-icon" id="togglePass" title="Mostrar/ocultar senha" style="cursor:pointer;">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
            <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
            <line x1="1" y1="1" x2="23" y2="23"/>
          </svg>
        </span>
      </div>
    </div>

    <button class="login-btn" id="btnLogin">
      <span class="login-btn-text">Entrar</span>
      <div class="login-spinner"></div>
    </button>

    <p class="login-forgot"><a href="#">Esqueceu a senha?</a></p>

    <span class="login-footer-note">© 2026 HubOn · CRECI 17135</span>
  </div>

    const BG_SRC   = 'login_bg.gif';

    document.getElementById('loginLogo').src = LOGO_SRC;
    document.getElementById('loginBg').src   = BG_SRC;

    // ── Login Logic ──
    const btnLogin   = document.getElementById('btnLogin');
    const inputUser  = document.getElementById('inputUser');
    const inputPass  = document.getElementById('inputPass');
    const loginError = document.getElementById('loginError');
    const togglePass = document.getElementById('togglePass');

    // Toggle password visibility
    togglePass.addEventListener('click', () => {
      const isPass = inputPass.type === 'password';
      inputPass.type = isPass ? 'text' : 'password';
      togglePass.innerHTML = isPass 
        ? '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>'
        : '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>';
    });

    btnLogin.addEventListener('click', () => {
      const user = inputUser.value.trim();
      const pass = inputPass.value.trim();

      loginError.style.display = 'none';
      btnLogin.classList.add('loading');

      // Simulação de delay de rede
      setTimeout(() => {
        if (user === 'admin' && pass === 'hubon2026') {
          sessionStorage.setItem('hubon_user', JSON.stringify({ name: 'Administrador', role: 'admin' }));
          window.location.href = 'index.html';
        } else {
          btnLogin.classList.remove('loading');
          loginError.style.display = 'block';
        }
      }, 800);
    });

    // Enter key support
    [inputUser, inputPass].forEach(el => {
      el.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') btnLogin.click();
      });
    });
  </script>
</body>
</html>
